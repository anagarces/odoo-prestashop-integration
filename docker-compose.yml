services:
  odoo-db:
    image: postgres:15
    container_name: stylesync-odoo-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks:
      - stylesync-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  odoo:
    image: odoo:17
    container_name: stylesync-odoo
    depends_on:
      odoo-db:
        condition: service_healthy
      prestashop:
        condition: service_started
    ports:
      - "8069:8069"
    environment:
      - HOST=odoo-db
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
      - ADMIN_PASSWD=${ODOO_ADMIN_PASSWD}
      - PRESTASHOP_API_KEY=${PRESTASHOP_API_KEY}
      - PRESTASHOP_URL=http://prestashop
    command: >
      odoo
      -d ${POSTGRES_DB}
      --db-filter=^${POSTGRES_DB}$$
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    networks:
      - stylesync-net
    restart: unless-stopped

  prestashop-db:
    image: mysql:8.0
    container_name: stylesync-ps-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ps_db_data:/var/lib/mysql
    networks:
      - stylesync-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  prestashop:
    image: prestashop/prestashop:8
    container_name: stylesync-prestashop
    depends_on:
      prestashop-db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      DB_SERVER: prestashop-db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWD: ${MYSQL_PASSWORD}
      PS_INSTALL_AUTO: 1
      PS_DOMAIN: localhost:8080
      PS_FOLDER_ADMIN: admin_stylesync
      PS_COUNTRY: es
      PS_LANGUAGE: es
      ADMIN_MAIL: ${PRESTASHOP_ADMIN_MAIL}
      ADMIN_PASSWD: ${PRESTASHOP_ADMIN_PASSWD}
    volumes:
      - ps_data:/var/www/html
    networks:
      - stylesync-net
    restart: unless-stopped

networks:
  stylesync-net:
    driver: bridge

volumes:
  odoo_db_data:
  odoo_data:
  ps_db_data:
  ps_data:
